<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete Account - mendo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #f0fdf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      border: 1px solid #bbf7d0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .logo {
      background-color: #059669;
      border-radius: 16px;
      padding: 12px 20px;
      display: inline-block;
      margin-bottom: 8px;
    }
    .logo-text {
      font-size: 24px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
    }
    .tagline { font-size: 13px; color: #065f46; margin-bottom: 32px; }
    .warning-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 28px;
    }
    .warning-icon { font-size: 36px; margin-bottom: 12px; }
    .warning-title { font-size: 18px; font-weight: 700; color: #991b1b; margin-bottom: 8px; }
    .warning-text { font-size: 14px; color: #6b7280; line-height: 1.6; }
    .btn-delete {
      display: block;
      background-color: #ef4444;
      color: white;
      font-size: 16px;
      font-weight: 700;
      padding: 16px 24px;
      border-radius: 14px;
      margin-bottom: 12px;
      cursor: pointer;
      border: none;
      width: 100%;
    }
    .btn-cancel {
      display: block;
      background: none;
      border: 1px solid #e5e7eb;
      color: #6b7280;
      font-size: 15px;
      padding: 14px 24px;
      border-radius: 14px;
      cursor: pointer;
      width: 100%;
    }
    .status { margin-top: 20px; font-size: 14px; color: #059669; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><span class="logo-text">mendo</span></div>
    <p class="tagline">Property maintenance, simplified</p>
    <div class="warning-box">
      <div class="warning-icon">&#9888;&#65039;</div>
      <div class="warning-title">Confirm Account Deletion</div>
      <div class="warning-text">
        This will permanently delete your mendo account and all associated data. This action cannot be undone.
      </div>
    </div>
    <button class="btn-delete" onclick="confirmDelete()">Yes, delete my account</button>
    <button class="btn-cancel" onclick="cancel()">Cancel - keep my account</button>
    <p class="status" id="status">Opening mendo app...</p>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');

    function confirmDelete() {
      if (!token) {
        document.getElementById('status').style.display = 'block';
        document.getElementById('status').style.color = '#ef4444';
        document.getElementById('status').innerText = 'Invalid link. Please request a new deletion email.';
        return;
      }
      document.getElementById('status').style.display = 'block';
      window.location.href = 'mendo://confirm-delete?token=' + token;
      setTimeout(function() {
        document.getElementById('status').innerText = 'If the app did not open, please open mendo manually and try again.';
      }, 3000);
    }

    function cancel() {
      document.getElementById('status').style.display = 'block';
      document.getElementById('status').innerText = 'Your account has not been deleted.';
      document.querySelector('.btn-delete').style.display = 'none';
      document.querySelector('.btn-cancel').style.display = 'none';
    }
  </script>
</body>
</html>
